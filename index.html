<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Quantum Speed | Internet Speed Test</title>
    <meta name="description" content="Fast and accurate internet speed test. Measure download, upload, and ping in seconds.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <canvas id="particle-canvas"></canvas>

    <main class="container">

        <!-- Header -->
        <header>
            <div class="logo">
                <div class="logo-icon-wrap">⚡</div>
                <span class="logo-text">QUANTUM SPEED</span>
            </div>
            <div class="status-badge" id="network-status">
                <span class="dot pulse"></span>
                <span class="status-text">Online</span>
            </div>
        </header>

        <!-- Speedometer -->
        <div class="speedometer-wrap">
            <svg class="speedometer" viewBox="0 0 300 220" id="speedometer-svg">
                <defs>
                    <linearGradient id="meterGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%"   style="stop-color:#00e5ff"/>
                        <stop offset="50%"  style="stop-color:#a855f7"/>
                        <stop offset="100%" style="stop-color:#ff6b6b"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <!-- Track -->
                <path class="meter-track" d="M 28 158 A 118 118 0 0 1 272 158" fill="none" stroke-width="16" stroke-linecap="round"/>
                <!-- Fill -->
                <path class="meter-fill" id="meter-fill" d="M 28 158 A 118 118 0 0 1 272 158" fill="none" stroke-width="16" stroke-linecap="round"/>
                <!-- Scale labels -->
                <text x="24"  y="175" class="arc-label">0</text>
                <text x="58"  y="105" class="arc-label">25</text>
                <text x="148" y="60"  class="arc-label">50</text>
                <text x="236" y="105" class="arc-label">75</text>
                <text x="260" y="175" class="arc-label">100+</text>
                <!-- Needle -->
                <g id="needle-group">
                    <line x1="150" y1="158" x2="150" y2="58" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="150" cy="158" r="10" fill="rgba(255,255,255,0.1)"/>
                    <circle cx="150" cy="158" r="5"  fill="white"/>
                    <circle cx="150" cy="158" r="2"  fill="#080812"/>
                </g>
                <!-- Speed text inside SVG -->
                <text id="svg-speed" x="150" y="186" class="svg-speed-val" text-anchor="middle">0.00</text>
                <text id="svg-unit"  x="150" y="201" class="svg-unit-label" text-anchor="middle">MBPS</text>
                <text id="svg-mbs"   x="150" y="214" class="svg-mbs-label"  text-anchor="middle">0.00 MB/s</text>
            </svg>
        </div>

        <!-- Phase Steps -->
        <div class="phase-steps">
            <div class="phase-step" id="phase-ping">
                <div class="phase-dot"></div>
                <span>Ping</span>
            </div>
            <div class="phase-connector" id="conn-1"></div>
            <div class="phase-step" id="phase-download">
                <div class="phase-dot"></div>
                <span>Download</span>
            </div>
            <div class="phase-connector" id="conn-2"></div>
            <div class="phase-step" id="phase-upload">
                <div class="phase-dot"></div>
                <span>Upload</span>
            </div>
        </div>

        <!-- Stat Cards: Ping | Download | Upload -->
        <div class="stats-grid">
            <div class="stat-card" id="card-ping">
                <div class="stat-icon ping-icon">📡</div>
                <div class="stat-label">Ping</div>
                <div class="stat-value-row">
                    <span class="stat-value" id="ping-value">--</span>
                    <span class="unit">ms</span>
                </div>
                <div class="stat-bar-bg"><div class="stat-bar ping-bar" id="ping-bar"></div></div>
            </div>
            <div class="stat-card" id="card-download">
                <div class="stat-icon download-icon">⬇</div>
                <div class="stat-label">Download</div>
                <div class="stat-value-row">
                    <span class="stat-value" id="download-speed">--</span>
                    <span class="unit">Mbps</span>
                </div>
                <div class="stat-sub" id="download-MBps">-- MB/s</div>
                <div class="stat-bar-bg"><div class="stat-bar download-bar" id="download-bar"></div></div>
            </div>
            <div class="stat-card" id="card-upload">
                <div class="stat-icon upload-icon">⬆</div>
                <div class="stat-label">Upload</div>
                <div class="stat-value-row">
                    <span class="stat-value" id="upload-speed">--</span>
                    <span class="unit">Mbps</span>
                </div>
                <div class="stat-sub" id="upload-MBps">-- MB/s</div>
                <div class="stat-bar-bg"><div class="stat-bar upload-bar" id="upload-bar"></div></div>
            </div>
        </div>

        <!-- Start Button -->
        <div class="actions">
            <button id="start-btn" class="primary-btn">
                <span class="btn-icon">▶</span>
                <span id="btn-text">Start Speed Test</span>
            </button>
        </div>

        <!-- Footer -->
        <footer>
            <div class="system-info">
                <span class="info-pill" id="ip-address">🌐 --</span>
                <span class="info-pill" id="isp-name">🏢 --</span>
                <span class="info-pill" id="location-info">📍 --</span>
            </div>
        </footer>

    </main>

    <script src="app.js"></script>
</body>
</html>
